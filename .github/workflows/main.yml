name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Backup Firebase Config & Recreate Android
        run: |
          # الاحتفاظ بنسخة من ملف جوجل للـ Firebase
          cp android/app/google-services.json ./google-services.json.bak || true
          
          # إعادة إنشاء مجلد الأندرويد
          rm -rf android
          flutter create . --project-name=manga_ps --platforms=android --org=com.mangaps.app
          
          # استرجاع ملف جوجل إلى مكانه الصحيح
          mkdir -p android/app
          cp ./google-services.json.bak android/app/google-services.json || true
          
          # ضبط minSdkVersion و إضافة تطبيق الـ Google Services Plugin
          sed -i 's/minSdkVersion.*/minSdkVersion 23/g' android/app/build.gradle
          sed -i 's/flutter.minSdkVersion/23/g' android/app/build.gradle
          
          # إدراج Google Services في build.gradle التابع للتطبيق
          echo 'apply plugin: "com.google.gms.google-services"' >> android/app/build.gradle
          
          # إدراج Google Services Classpath في build.gradle الرئيسي
          sed -i '/dependencies {/a \        classpath "com.google.gms:google-services:4.3.15"' android/build.gradle || true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
 
